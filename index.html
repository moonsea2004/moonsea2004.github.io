<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>🚧施工中🚧</title>
    <style>
        body {
            background-color: #c0c0c0;
            font-family: "MS Sans Serif", Tahoma, sans-serif;
            margin: 0;
            padding: 0;
            color: black;
        }

        .titlebar {
            background-color: #000080;
            color: white;
            padding: 10px;
            font-weight: bold;
            font-size: 16px;
        }

        .statusbar {
            background-color: #e0e0e0;
            padding: 8px;
            text-align: center;
            font-size: 14px;
            border-bottom: 1px solid #bfbfbf;
        }

        .window {
            background-color: #d4d0c8;
            border: 2px solid #000080;
            margin: 40px auto;
            width: 80%;
            max-width: 600px;
            padding: 10px;
            text-align: center;
        }

        .content {
            background-color: white;
            padding: 30px;
            border: 1px solid #bfbfbf;
            font-size: 18px;
        }

        footer {
            text-align: center;
            font-size: 12px;
            color: #333;
            margin-top: 40px;
        }

        canvas {
            border: 1px solid black;
            margin-top: 20px;
            border-radius: 50%;
            background-color: #fff;
        }

        #siteRuntime {
            display: block;
            margin-top: 5px;
            font-size: 12px;
            color: #333;
        }
    </style>

    <script>
        // 时钟绘制脚本
        (function () {
            var canvas = null;
            var ctx = null;
            var cw = 0;
            var ch = 0;

            window.addEventListener("load", function () {
                canvas = document.getElementById("sample");
                ctx = canvas.getContext("2d");
                cw = parseInt(canvas.width);
                ch = parseInt(canvas.height);

                ctx.translate(cw / 2, ch / 2); // 移动原点到中心

                draw_watch();
            }, false);

            function draw_watch() {
                ctx.clearRect(-cw / 2, -ch / 2, cw, ch);
                var len = Math.min(cw, ch) / 2;
                var tlen = len * 0.85;

                ctx.font = "14px 'Arial'";
                ctx.fillStyle = "black";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";

                for (var i = 1; i <= 12; i++) {
                    var tag1 = Math.PI * 2 * (3 - i) / 12;
                    var tx = tlen * Math.cos(tag1);
                    var ty = -tlen * Math.sin(tag1);
                    ctx.fillText(i, tx, ty);
                }

                var d = new Date();
                var h = d.getHours();
                var m = d.getMinutes();
                var s = d.getSeconds();
                if (h > 12) {
                    h -= 12;
                }

                var angle1 = Math.PI * 2 * (3 - (h + m / 60)) / 12;
                drawhand(angle1, len * 0.5, 5, "#000000");

                var angle2 = Math.PI * 2 * (15 - (m + s / 60)) / 60;
                drawhand(angle2, len * 0.7, 3, "#555555");

                var angle3 = Math.PI * 2 * (15 - s) / 60;
                drawhand(angle3, len * 0.8, 1, "#aa0000");

                setTimeout(draw_watch, 1000);
            }

            function drawhand(angle, len, width, color) {
                var x = len * Math.cos(angle);
                var y = -len * Math.sin(angle);
                ctx.strokeStyle = color;
                ctx.lineWidth = width;
                ctx.lineCap = "round";
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(x, y);
                ctx.stroke();
            }
        })();

        // 网站运行时间统计脚本
        function runtime() {
            const startDate = new Date("06/29/2024 18:00:00");
            const now = new Date();
            let diff = (now.getTime() - startDate.getTime()) / 1000; // 单位：秒

            const secondsInDay = 24 * 60 * 60;
            const secondsInHour = 60 * 60;
            const secondsInMinute = 60;

            const days = Math.floor(diff / secondsInDay);
            diff -= days * secondsInDay;

            const hours = Math.floor(diff / secondsInHour);
            diff -= hours * secondsInHour;

            const minutes = Math.floor(diff / secondsInMinute);
            const seconds = Math.floor(diff % 60);

            document.getElementById('siteRuntime').innerHTML = 
                `本网站已运行: ${days}天${hours}小时${minutes}分${seconds}秒`;
        }

        setInterval(runtime, 1000);

        // 动态更新版权年份
        document.addEventListener("DOMContentLoaded", function() {
            var currentYear = new Date().getFullYear();
            document.getElementById('currentYear').textContent = currentYear;
        });
    </script>
</head>
<body>

<div class="titlebar">moonsea2004 的小营地 - Internet Explorer</div>

<div class="statusbar">🌐 此页面表示当前您已接入互联网</div>

<div class="window">
    <div class="content">
        <h2 style="color: #000080; margin-bottom: 20px;">🚧 网站正在建设中 🚧</h2>
        <p>感谢您的访问！</p>
        <!-- 圆形时钟 -->
        <canvas id="sample" width="150" height="150"></canvas>
    </div>
</div>

<footer>
    &copy; 2024 - <span id="currentYear"></span> moonsea2004 所有内容仅供学习参考。<br/>
    <span id="siteRuntime">本网站已运行: 加载中...</span>
</footer>

</body>
</html>
